# ─── Développement local ──────────────────────────────────────────────────────
# Usage : make  (build + up automatique)
# Les sources sont montées → hot-reload sans rebuild ni redémarrage.
# La prod utilise docker-compose.yml (deploy.sh)
# ──────────────────────────────────────────────────────────────────────────────

services:
  # Base de données MySQL locale
  db:
    image: mysql:8.0
    container_name: p4-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-p4game}
      MYSQL_USER: ${MYSQL_USER:-p4user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-p4password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - dev-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Backend API — hot-reload via tsx watch
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev              # stage dev du Dockerfile
    container_name: p4-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://${MYSQL_USER:-p4user}:${MYSQL_PASSWORD:-p4password}@db:3306/${MYSQL_DATABASE:-p4game}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
      IP: 0.0.0.0
      FRONTEND_URL: http://localhost:3001
      BACKEND_URL: http://localhost:3000
      AI_SERVICE_URL: http://p4-ai:4000
      AI_BOT_ID: ${AI_BOT_ID:-ai-bot}
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src          # sources TypeScript — hot-reload
      - ./backend/prisma:/app/prisma    # schéma Prisma
    networks:
      - dev-net
    depends_on:
      db:
        condition: service_healthy

  # Frontend Next.js — hot-reload via next dev
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev              # stage dev du Dockerfile
    container_name: p4-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      HOSTNAME: 0.0.0.0
      WATCHPACK_POLLING: "true"          # détection de changements sur macOS
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - ./frontend/src:/app/src          # composants React / pages — hot-reload
      - ./frontend/public:/app/public    # assets statiques
    networks:
      - dev-net
    depends_on:
      - backend

  # Service IA — hot-reload via tsx watch
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
      target: dev              # stage dev du Dockerfile
    container_name: p4-ai
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      BACKEND_WS_URL: http://p4-backend:3000
    ports:
      - "4000:4000"
    volumes:
      - ./ai-service/src:/app/src       # sources TypeScript — hot-reload
    networks:
      - dev-net
    depends_on:
      - backend

networks:
  dev-net:
    driver: bridge

volumes:
  mysql-data:
    driver: local
